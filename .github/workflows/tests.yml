name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux runtime dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            xdg-utils \
            libgtk-3-0 \
            libnss3 \
            libgbm1 \
            libxss1 \
            libxtst6 \
            libatspi2.0-0 \
            libdrm2 \
            libxcb-dri3-0 \
            libnotify4
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Verify Electron runtime
        run: |
          npx electron --version
          missing_libs="$(ldd node_modules/electron/dist/electron | grep 'not found' || true)"
          if [ -n "$missing_libs" ]; then
            echo "$missing_libs"
            exit 1
          fi

      - name: Run test suite
        run: npm run test:ci

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
